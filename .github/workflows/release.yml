name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Strip -rN revision suffix for the body version
          VERSION="$(echo "$TAG" | sed 's/-r[0-9]*$//')"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "This release corresponds to Dota 2 ${VERSION}"
